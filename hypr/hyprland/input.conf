input {
    kb_layout = br,us
    kb_model = abnt2
    kb_options = grp:alt_space_toggle

    follow_mouse = 1
    sensitivity = -0.7


    numlock_by_default = true
    repeat_delay = 250
    repeat_rate = 35

    focus_on_close = 1

    touchpad {
        natural_scroll = true
        disable_while_typing = $touchpadDisableTyping
        scroll_factor = $touchpadScrollFactor
    }
}

binds {
    scroll_event_delay = 0
}

cursor {
    hotspot_padding = 1
}

